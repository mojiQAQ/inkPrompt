<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170">
  <defs>
    <linearGradient id="a" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="c" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="gl" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Pen icon (scaled down, centered above text) -->
  <g transform="translate(60,55) scale(0.55)">
    <g transform="rotate(-45)">
      <rect x="-11" y="-85" width="22" height="46" rx="3" fill="url(#c)"/>
      <rect x="-14" y="-40" width="28" height="7" rx="2" fill="url(#b)" opacity="0.5"/>
      <path d="M-30,-33 L30,-33 L0,52 Z" fill="url(#a)"/>
      <path d="M0,-33 L30,-33 L0,52 Z" fill="#0f172a" opacity="0.12"/>
      <line x1="0" y1="46" x2="0" y2="-24" stroke="rgba(255,255,255,0.5)" stroke-width="1.8"/>
      <circle cx="0" cy="0" r="5.5" fill="rgba(255,255,255,0.85)"/>
    </g>
    <!-- Terminal "> _" -->
    <g filter="url(#gl)">
      <polyline points="26,-56 38,-47 26,-38" fill="none" stroke="url(#b)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="42" y1="-39" x2="56" y2="-39" stroke="url(#b)" stroke-width="4" stroke-linecap="round"/>
    </g>
    <!-- Ink drop -->
    <path d="M-22,62 C-24,66 -24,70 -22,72 C-20,70 -20,66 -22,62 Z" fill="#0f172a" opacity="0.85"/>
    <!-- Pixels -->
    <rect x="36" y="-20" width="4" height="4" rx="1" fill="#06b6d4" opacity="0.85"/>
    <rect x="42" y="-26" width="3" height="3" rx="1" fill="#22d3ee" opacity="0.75"/>
    <rect x="40" y="-13" width="3.5" height="3.5" rx="1" fill="#0891b2" opacity="0.6"/>
    <!-- Stars -->
    <path d="M50,-28 l1,-3 1,3 3,1 -3,1 -1,3 -1,-3 -3,-1z" fill="#22d3ee" opacity="0.7"/>
    <path d="M48,-8 l0.7,-2 0.7,2 2,0.7 -2,0.7 -0.7,2 -0.7,-2 -2,-0.7z" fill="#06b6d4" opacity="0.5"/>
  </g>

  <!-- "ink" text with ink-drop dot on "i" -->
  <g>
    <!-- "i" stem (dotless) -->
    <text x="118" y="140" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="56" fill="#0f172a" letter-spacing="-1">
      <tspan>ı</tspan>
    </text>
    <!-- Ink drop as "i" dot -->
    <path d="M127,96 C124,100 124,104 127,106 C130,104 130,100 127,96 Z" fill="#0f172a"/>
    <!-- "nk" -->
    <text x="136" y="140" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="56" fill="#0f172a" letter-spacing="-1">nk</text>
  </g>

  <!-- "Prompt" text -->
  <text x="222" y="140" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="50" fill="#0891b2" letter-spacing="-0.5">Prompt</text>
</svg>
