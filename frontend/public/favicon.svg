<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="a" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="c" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="gl" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Whole pen: nib lower-left, barrel upper-right, ~45° tilt -->
  <g transform="translate(46,70) rotate(-45)">
    <!-- Barrel -->
    <rect x="-11" y="-85" width="22" height="46" rx="3" fill="url(#c)"/>
    <!-- Band -->
    <rect x="-14" y="-40" width="28" height="7" rx="2" fill="url(#b)" opacity="0.5"/>
    <!-- Nib body -->
    <path d="M-30,-33 L30,-33 L0,52 Z" fill="url(#a)"/>
    <!-- Nib shadow for depth -->
    <path d="M0,-33 L30,-33 L0,52 Z" fill="#0f172a" opacity="0.12"/>
    <!-- Nib slit -->
    <line x1="0" y1="46" x2="0" y2="-24" stroke="rgba(255,255,255,0.5)" stroke-width="1.8"/>
    <!-- Nib hole -->
    <circle cx="0" cy="0" r="5.5" fill="rgba(255,255,255,0.85)"/>
  </g>

  <!-- Terminal "> _" in upper-right with glow -->
  <g filter="url(#gl)">
    <polyline points="72,10 87,22 72,34" fill="none" stroke="url(#b)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="92" y1="33" x2="110" y2="33" stroke="url(#b)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Ink drop below pen tip -->
  <path d="M24,100 C21,104 21,108 24,110 C27,108 27,104 24,100 Z" fill="#0f172a" opacity="0.85"/>

  <!-- Pixel sparkles - scattered to lower-right of pen body -->
  <rect x="76" y="56" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.85"/>
  <rect x="84" y="48" width="3.5" height="3.5" rx="1" fill="#22d3ee" opacity="0.75"/>
  <rect x="82" y="64" width="4" height="4" rx="1" fill="#0891b2" opacity="0.65"/>
  <rect x="90" y="58" width="2.5" height="2.5" rx="1" fill="#06b6d4" opacity="0.55"/>
  <rect x="72" y="68" width="3.5" height="3.5" rx="1" fill="#22d3ee" opacity="0.45"/>

  <!-- Star sparkles -->
  <path d="M96,46 l1.5,-4 1.5,4 4,1.5 -4,1.5 -1.5,4 -1.5,-4 -4,-1.5z" fill="#22d3ee" opacity="0.8"/>
  <path d="M92,72 l1,-3 1,3 3,1 -3,1 -1,3 -1,-3 -3,-1z" fill="#06b6d4" opacity="0.55"/>
  <path d="M100,62 l0.7,-2 0.7,2 2,0.7 -2,0.7 -0.7,2 -0.7,-2 -2,-0.7z" fill="#22d3ee" opacity="0.4"/>
</svg>
