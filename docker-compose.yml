version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inkprompt-backend
    network_mode: host
    env_file:
      - ./backend/.env
    volumes:
      # 数据库持久化
      - ./backend/inkprompt.db:/app/inkprompt.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inkprompt-frontend
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
